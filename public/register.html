<!DOCTYPE html>
<html>
<head>
  <title>Register - NARDO</title>
  <style>
    body { background: #111; color: #fff; font-family: Poppins, sans-serif; }
    .box { width: 350px; margin: 120px auto; background:#1a1a1a; padding:30px; border-radius:10px; }
    input { width:100%; padding:12px; margin-bottom:12px; border-radius:6px; border:1px solid #444; background:#222; color:#fff; }
    button { width:100%; padding:12px; background:#d4a047; border:none; border-radius:6px; font-weight:600; cursor:pointer; }
    button:hover { background:#b78b3d; }
    p { text-align:center; color:#d4a047; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Register</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <p id="msg"></p>
  </div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();
  document.getElementById("msg").textContent = data.message;
});
</script>

</body>
</html>
