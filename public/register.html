<!DOCTYPE html>
<html>
<head>
  <title>Register - NARDO</title>
  <style>
    body { background: #111; color: #fff; font-family: Poppins, sans-serif; }
    .box { width: 350px; margin: 120px auto; background:#1a1a1a; padding:30px; border-radius:10px; }
    input { width:100%; padding:12px; margin-bottom:12px; border-radius:6px; border:1px solid #444; background:#222; color:#fff; }
    button { width:100%; padding:12px; background:#d4a047; border:none; border-radius:6px; font-weight:600; cursor:pointer; }
    button:hover { background:#b78b3d; }
    p { text-align:center; color:#d4a047; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Register</h2>
    <form id="registerForm">

          <input
        type="text"
        name="name"
        id="name"
        placeholder="Full Name"
        pattern="^[A-Za-z ]+$"
        title="Name must contain letters only"
        required
      >
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Create Account</button>
    </form>

    <p id="msg"></p>
  </div>

<script>
document.getElementById("registerForm").onsubmit = async function(e){
  e.preventDefault();

  const formData = {
    name: this.name.value,
    email: this.email.value,
    password: this.password.value
  };

  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(formData)
  });

  const data = await res.json();
  document.getElementById("msg").textContent = data.message;
};
</script>
<script src="script.js"></script>
</body>
</html>
