<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customize Your Furniture - NARDO</title>

  <!-- Use your existing theme styles -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #111; 
      color: #fff;
      font-family: 'Poppins', sans-serif;
    }

    .order-wrapper {
      max-width: 800px;
      margin: 120px auto;
      padding: 50px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: 2px;
      font-weight: 600;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #d4d4d4;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      margin-bottom: 20px;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #d4a047;
      outline: none;
      background: #252525;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #d4a047;
      color: #111;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    button:hover {
      background: #b78b3d;
    }

    #response {
      text-align: center;
      margin-top: 15px;
      font-size: 16px;
      color: #d4a047;
    }
  </style>

</head>

<body>

  <div class="order-wrapper">
    <h2>CUSTOM FURNITURE REQUEST</h2>

    <form id="orderForm" enctype="multipart/form-data">

      <label>Your Name</label>
      <input type="text" name="name" required>

      <label>Your Email</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="text" name="phone" required>

      <label>Product Type</label>
      <select name="product_type" required>
        <option value="Chair">Chair</option>
        <option value="Table">Table</option>
        <option value="Ottoman">Ottoman</option>
        <option value="Planter">Planter</option>
        <option value="Other">Other (Custom Design)</option>
      </select>

      <label>Size</label>
      <select name="size">
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
      </select>

      <label>Finish</label>
      <select name="finish">
        <option>Matte</option>
        <option>Gloss</option>
        <option>Painted</option>
      </select>

      <label>Texture</label>
      <select name="texture">
        <option>Smooth</option>
        <option>Rugged</option>
        <option>Patterned</option>
      </select>

      <label>Color (Black / White / Custom)</label>
      <input type="text" name="color">

      <label>Upload Reference / Sketch (Optional)</label>
      <input type="file" name="designImage" accept="image/*">

      <label>Additional Notes</label>
      <textarea name="notes" rows="4"></textarea>

      <button type="submit">Submit Request</button>
    </form>

    <p id="response"></p>
  </div>

<script>
document.getElementById("orderForm").onsubmit = async function(e) {
  e.preventDefault();
  const formData = new FormData(this);

  const response = await fetch('/api/orders', {
    method: 'POST',
    body: formData
  });

  const result = await response.json();
  document.getElementById("response").textContent = result.message;
};
</script>
<script src="script.js"></script>
</body>
</html>
