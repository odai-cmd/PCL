<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARDO Login</title>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      width: 380px;
      background: #1a1a1a;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 14px;
      margin-bottom: 6px;
      color: #d4d4d4;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #d4a047;
      background: #252525;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #d4a047;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }

    button:hover {
      background: #b78b3d;
      transform: scale(1.05);
    }

    a {
      color: #d4a047;
      text-decoration: none;
      font-size: 14px;
      display: block;
      margin-top: 10px;
    }

    #loginMessage {
      margin-top: 14px;
      color: #d4a047;
      font-size: 15px;
    }
  </style>

</head>

<body>

  <div class="login-box">
    <h2>Welcome Back</h2>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
      <p id="msg" style="text-align:center; margin-top:12px;"></p>
    </form>

    <p id="loginMessage"></p>

    <a href="register.html">Create a new account</a>
  </div>

<script>
document.getElementById("loginForm").onsubmit = async function(e){
  e.preventDefault();

  const email = this.email.value;
  const password = this.password.value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  const msg = document.getElementById("msg");

  if(!data.success){
    msg.style.color = "red";
    msg.textContent = data.message;   // ✅ SHOWS ERROR FROM SERVER
    return;
  }
  

  // ✅ Login success
  msg.style.color = "#4caf50";
  msg.textContent = "Login successful! Redirecting...";
  setTimeout(() => {
    window.location.href = "/";
  }, 1200);
};
   req.session.role = user.role;
</script>
<script src="script.js"></script>
</body>
</html>
